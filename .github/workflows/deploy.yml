name: release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        target:
          - x86_64-linux-gnu
          - aarch64-macos-none
          - x86_64-macos-none
          - aarch64-linux-gnu

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: master
      - name: Build
        run: |
          zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast

      - name: Rename and Package
        run: |
          cd zig-out/bin
          mv ls ls-${{ matrix.target }}
          tar -czvf ls-${{ matrix.target }}.tar.gz ls-${{ matrix.target }}

      - name: Upload
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') # only for tags
        with:
          files: zig-out/bin/*.tar.gz
